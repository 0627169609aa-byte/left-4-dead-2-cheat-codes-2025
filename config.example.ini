```ini
[General]
# Enable or disable the cheat application
enabled=true
# Set the game path where Left 4 Dead 2 is installed
game_path=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
# Set the game's executable name
game_executable=left4dead2.exe
# Toggle debug mode for troubleshooting
debug_mode=false

[Hotkeys]
# Hotkey to toggle infinite ammo
infinite_ammo_hotkey=F1
# Hotkey to toggle God mode
god_mode_hotkey=F2
# Hotkey to toggle noclip (fly through walls)
noclip_hotkey=F3
# Hotkey to give all weapons
give_weapons_hotkey=F4
# Hotkey to heal all teammates
heal_all_hotkey=F5

[Features]
# Enable infinite ammo feature
infinite_ammo=true
# Enable God mode for invincibility
god_mode=true
# Enable noclip mode
noclip=false
# Enable instant weapon recovery
instant_weapon_recovery=true
# Enable auto-heal for teammates
auto_heal=true

[Display]
# Set UI font size (small, medium, large)
ui_font_size=medium
# Toggle display of cheat activation messages
show_activation_messages=true
# Set transparency level for the cheat overlay (0-255)
overlay_transparency=150
# Change overlay position (x,y coordinates, e.g., "100,200")
overlay_position=100,100
```