```ini
[General]
; Configuration for Left 4 Dead 2 Cheat Tool
GamePath=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
; Specifies the path to the Left 4 Dead 2 installation folder

AutoLaunch=true
; Automatically launch the cheat tool when Left 4 Dead 2 starts

DebugMode=false
; Set to true to enable debugging messages in the console

[Hotkeys]
; Define hotkeys for enabling/disabling cheats
ToggleGodMode=F1
; Press F1 to toggle God Mode on/off

ToggleInfiniteAmmo=F2
; Press F2 for infinite ammunition

ToggleNoClip=F3
; Press F3 to enable/disable No Clip mode

SpawnItems=F4
; Press F4 to spawn health packs, weapons, etc.

[Features]
; Cheats and features available in the app
EnableGodMode=true
; Enable invincibility for the player

EnableInfiniteAmmo=true
; Grant infinite ammo for all weapons

EnableNoClip=false
; Toggle no clip mode (fly through walls)

EnableSpawnItems=true
; Allow spawning of items during gameplay

ItemList="First Aid Kit","Pills","Medi Kit","Weapons"
; List of items available for spawning

[Display]
; Settings for the user interface and in-game overlays
ShowFPS=true
; Display the frames per second in the top-right corner

OverlayOpacity=0.75
; Set the opacity level of the overlay (0.0 to 1.0)

OverlayPosition=top-right
; Position of the cheat tool overlay in relation to the game window

FontSize=14
; Font