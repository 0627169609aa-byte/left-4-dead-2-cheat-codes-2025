```ini
[General]
# Path to Left 4 Dead 2 installation directory
GamePath=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

# Enable debug logging
DebugLogging=True

# Set the version of the cheat application
AppVersion=1.0.0

[Hotkeys]
# Key bindings for activating cheats
# (Use the format: key = action)
GodModeKey=F1               # Toggle God Mode for invincibility
InfiniteAmmoKey=F2          # Toggle Infinite Ammo
OneHitKillKey=F3            # Enable One Hit Kill mode
NoClipKey=F4                # Toggle No Clip mode
SpawnWeaponsKey=F5          # Spawn any weapon
ToggleZombiesKey=F6         # Toggle zombies on/off

[Features]
# Enable or disable specific cheat features
EnableGodMode=True           # Set to True to enable God Mode
EnableInfiniteAmmo=True      # Set to True for unlimited ammunition
EnableOneHitKill=False       # Set to True for one-hit kills
EnableNoClip=False           # Set to True to walk through walls
EnableSpawnWeapons=True      # Set to True to allow weapon spawning

[Display]
# Display settings for the cheat overlays
OverlayPosition=TopRight     # Position of the cheat overlay on screen
OverlayOpacity=80             # Opacity of the overlay (0-100%)
ShowFPSCounter=True           # Set to True to show FPS in the overlay
DisplayCheatStatus=True       # Show current cheat status in the overlay
```