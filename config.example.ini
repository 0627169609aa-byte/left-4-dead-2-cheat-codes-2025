```ini
[General]
; Path to Left 4 Dead 2 installation
game_path = "C:\\Program Files (x86)\\Steam\\steamapps\\common\\Left 4 Dead 2"
; Enable or disable the app (true or false)
enabled = true
; Set the language for the app
language = "en_US"

[Hotkeys]
; Hotkey for activating wallhack
wallhack_key = "F1"
; Hotkey for enabling infinite ammo
infinite_ammo_key = "F2"
; Hotkey for speed boost
speed_boost_key = "F3"
; Hotkey for toggling god mode
god_mode_key = "F4"

[Features]
; Enable wallhack feature
wallhack_enabled = true
; Enable infinite ammo feature
infinite_ammo_enabled = true
; Enable speed boost feature
speed_boost_enabled = true
; Enable god mode feature
god_mode_enabled = false
; Enable no-clip feature
no_clip_enabled = false

[Display]
; Display debug messages in console
debug_mode = true
; Customize the overlay opacity (0.0 to 1.0)
overlay_opacity = 0.75
; Position of overlay on the screen [x, y]
overlay_position = "100, 50"
; Choose the color of the overlay text
overlay_text_color = "#FFFFFF"
```