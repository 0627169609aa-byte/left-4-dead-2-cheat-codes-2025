```ini
[General]
; Define the main settings for the application
app_name = Left 4 Dead 2 Cheat Tool
app_version = 1.0.0
developer = YourName
game_path = C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

[Hotkeys]
; Hotkeys for activating cheats
toggle_god_mode = F1 ; Toggle invincibility (God Mode)
toggle_infinite_ammo = F2 ; Enable/Disable infinite ammo
toggle_one_hit_kills = F3 ; One-hit kills for all weapons
toggle_special_spawn = F4 ; Spawn special infected (e.g. Tank, Witch)
toggle_speedhack = F5 ; Speed up player movement
toggle_noclip = F6 ; Toggle noclip mode (walk through walls)

[Features]
; Enable or disable specific features
enable_god_mode = true ; Enable the God mode feature
enable_infinite_ammo = true ; Enable infinite ammo
enable_one_hit_kills = true ; Enable one-hit kills
enable_special_spawn = false ; Spawn special infected feature is disabled by default
enable_speedhack = false ; Speedhack feature is disabled by default
enable_noclip = false ; Noclip feature is disabled by default 

[Display]
; Display settings for the application
show_fps = true ; Show frames per second counter in the game
enable_crosshair = true ; Custom crosshair feature
crosshair_color = #FF0000 ; Red color for the crosshair in RGB hex
window_opacity = 0.8 ; Window opacity level (0.0 - fully transparent, 1.0 - fully opaque)
fullscreen_mode