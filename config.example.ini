```ini
[General]
; Application settings for Left 4 Dead 2 Cheat
app_name = Left 4 Dead 2 Cheat Tool
version = 1.0
author = Your Name
; Enable or disable the application
enabled = true

[Hotkeys]
; Set hotkeys for various cheats
toggle_cheats = F1          ; Toggle cheats on/off
give_weapon = F2            ; Give a specific weapon
god_mode = F3               ; Activate god mode
infinite_ammo = F4          ; Enable infinite ammo
no_clip = F5                ; Toggle no-clip mode
spawn_bot = F6              ; Spawn a bot for assistance
trigger_autofire = F7       ; Enable automatic firing

[Features]
; Enable or disable specific cheat features
enable_god_mode = true      ; Use immortality in campaigns
allow_infinite_ammo = true  ; Get unlimited ammo for all weapons
enable_no_clip = false      ; Allow flying through walls
enable_aimbot = false       ; Optional: Aim assist for easier kills
spawn_items = true          ; Instantaneously spawn health packs, molotovs, etc.
auto_revive = false         ; Automatically revive yourself after downed
trigger_bot_assist = true   ; Automatically command bots to assist

[Display]
; Configuration for the user interface and overlays
overlay_position = top-right ; Position of overlay (top-left, top-right, bottom-left, bottom-right)
overlay_transparency = 75    ; Transparency level of 0 (invisible) to 100 (fully visible)
show_fps_counter = true      ; Show FPS counter while playing
enable_chat_box = false      ; Enable chat box