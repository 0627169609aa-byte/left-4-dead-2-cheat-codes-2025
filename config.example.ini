```ini
[General]
; Path to the Left 4 Dead 2 installation directory
L4D2Path=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
; Enable or disable the cheat application (true/false)
Enabled=true

[Hotkeys]
; Key bindings for various cheat functions
; F1 - God Mode
GodModeKey=F1
; F2 - Infinite ammo
InfiniteAmmoKey=F2
; F3 - No clip mode
NoClipKey=F3
; F4 - Spawn items
SpawnItemsKey=F4

[Features]
; Enable or disable specific cheats
; God mode allows players to take no damage
GodMode=true
; Infinite ammo allows players to shoot without running out of bullets
InfiniteAmmo=true
; No clip mode allows players to walk through walls
NoClip=true
; Instant respawn for dead players
InstantRespawn=true
; Spawn specific weapons or items
SpawnWeapons=true
; Enable zombie AI manipulation
ZombieControl=true

[Display]
; Game overlay settings
; Show FPS counter in the game's corner (true/false)
ShowFPS=true
; Display cheat notifications on screen (true/false)
ShowNotifications=true
; Overlay opacity level (0.0 to 1.0)
OverlayOpacity=0.8
```