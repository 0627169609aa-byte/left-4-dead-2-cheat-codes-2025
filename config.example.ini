```ini
[General]
# Set the game directory for Left 4 Dead 2
GameDirectory=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

# Enable or disable the cheat application (true or false)
Enabled=true

# Specify the update interval for cheat checks (in milliseconds)
UpdateInterval=100

[Hotkeys]
# Hotkey settings for enabling/disabling cheats
# CTRL + H to toggle god mode
ToggleGodMode=CTRL+H

# Hotkey settings for instant ammo refill
# F3 to refill ammo
RefillAmmo=F3

# Hotkey for spawning items (e.g., health packs, molotovs)
# F4 to spawn a health pack
SpawnHealthPack=F4

# Hotkey to toggle infinite survivor lives
# F5 to toggle survivor lives
ToggleInfiniteLives=F5

[Features]
# Enable or disable specific cheat features
GodMode=true     # Allows the player to take no damage
InfiniteAmmo=true # Infinite ammunition for all weapons
SpawnItems=true   # Allows spawning of health packs and weapons
AutoAim=false     # Enables auto-aim feature (not recommended for competitive play)

[Display]
# Configure display settings for the application overlay
OverlayPosition=TopRight      # Determines where on the screen the overlay appears
OverlayOpacity=0.8            # Controls the transparency of the overlay (0.0 - 1.0)

# Set the font size for the overlay display
OverlayFontSize=12

# Enable or disable display of cheat notifications
ShowNotifications=true         # Show or hide notifications on successful cheat activation
```