```ini
[General]
# Set the game executable path
GamePath = C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2\left4dead2.exe

# Enable/disable the application (true/false)
Enabled = true

# Set the update check interval in hours
UpdateCheckInterval = 24

[Hotkeys]
# Hotkey for activating the aimbot
AimbotToggle = F1

# Hotkey for activating wallhack
WallhackToggle = F2

# Hotkey for spawning items
SpawnItems = F3

# Hotkey for instant reload
InstantReload = F4

# Hotkey for noclip mode
NoclipToggle = F5

[Features]
# Enable or disable aimbot
AimbotEnabled = true

# Enable or disable wallhack
WallhackEnabled = true

# Enable or disable item spawning
ItemSpawningEnabled = true

# Enable instant reload feature
InstantReloadEnabled = true

# Enable noclip mode for flying
NoclipEnabled = false

# Enable god mode for invincibility
GodModeEnabled = true

[Display]
# Set the size of the overlay in pixels
OverlayWidth = 800
OverlayHeight = 600

# Set the position of the overlay (X, Y)
OverlayPosition = 100, 100

# Choose overlay transparency (0-255)
OverlayTransparency = 180

# Show FPS counter in overlay (true/false)
ShowFPSCounter = true

# Set font size for overlay text
FontSize = 12
```