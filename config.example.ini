```ini
[General]
; Application settings
app_name = Left 4 Dead 2 Cheat Tool
version = 1.0
enable_auto_update = true

; Custom game directory for Left 4 Dead 2
game_directory = C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

[Hotkeys]
; Set your hotkeys for various cheats
toggle_god_mode = F1          ; Press F1 to toggle god mode (invincibility)
toggle_inf_ammo = F2          ; Press F2 for infinite ammo
toggle_no_clip = F3           ; Press F3 to enable/disable no clip mode
spawn_items = F4              ; Press F4 to spawn items
toggle_invisible = F5          ; Press F5 to toggle invisibility

[Features]
; Enable or disable various cheat features
enable_god_mode = true        ; Set to true to activate god mode
enable_infinite_ammo = true   ; Set to true for infinite ammunition
enable_no_clip = false        ; Set to true to enable no clip
enable_item_spawn = true      ; Set to true to allow item spawning
enable_invisibility = false    ; Set to true to turn on invisibility
enable_auto_headshot = true    ; Automatically aim for headshots

[Display]
; Settings for the display of cheat notifications
show_notifications = true       ; Display notifications for cheat activations
notification_duration = 5       ; Duration in seconds for notifications
font_size = 12                  ; Font size for the on-screen text
notification_color = "255,0,0" ; RGB color for notification text (red)
```