```ini
[General]
; General settings for the Left 4 Dead 2 cheat application
game_path=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
auto_start=false
; Set to true if you want the application to start automatically with Left 4 Dead 2

[Hotkeys]
; Configure hotkeys for various cheats and features
toggle_cheats=F12
; Press F12 to toggle all cheats on or off
heal_player=F9
; Press F9 to instantly heal the player
give_weapons=F10
; Press F10 to give the player all weapons
spawn_infected=F11
; Press F11 to spawn a specific infected type (configurable in Features section)

[Features]
; Enable or disable various features of the cheat application
infinite_ammo=true
; Set to true to enable infinite ammo for all weapons
one_hit_kill=true
; Set to true for one-hit kills against zombies and special infected
no_reload=true
; Set to true to disable weapon reloading
speed_boost=false
; Set to true to increase player movement speed (may unbalance gameplay)

[Display]
; Configure display settings for the cheat application interface
window_position_X=100
window_position_Y=100
; Set the X and Y position of the cheat application window on startup
display_fps=true
; Set to true to show FPS counter in the application overlay
show_hints=true
; Set to true to display hints for commands and features during gameplay
```