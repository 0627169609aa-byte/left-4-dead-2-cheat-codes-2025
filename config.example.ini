```ini
[General]
; Set the path to Left 4 Dead 2 installation folder
GamePath=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

; Enable or disable the cheat application
Enabled=true

; Set the application language
Language=en_US

[Hotkeys]
; Hotkey to toggle God Mode
GodModeKey=F1

; Hotkey to instantly reload weapons
InstantReloadKey=F2

; Hotkey to give all weapons
GiveAllWeaponsKey=F3

; Hotkey to set player speed multiplier
SpeedBoostKey=F4

; Hotkey to toggle infinite ammo
InfiniteAmmoKey=F5

[Features]
; Enable God Mode
EnableGodMode=true

; Give players all weapons upon activation
EnableGiveAllWeapons=true

; Toggle speed boost for player
EnableSpeedBoost=true

; Enable infinite ammo for weapons
EnableInfiniteAmmo=true

; Enable one-hit kills
EnableOneHitKills=false

[Display]
; Display in-game notifications and alerts
ShowNotifications=true

; Set the opacity of the cheat overlay (0=transparent, 255=opaque)
OverlayOpacity=150

; Position of the overlay (X coordinate, Y coordinate)
OverlayPositionX=100
OverlayPositionY=100

; Set overlay font size
OverlayFontSize=12
```