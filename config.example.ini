```ini
[General]
# Set the game path to your Left 4 Dead 2 installation directory
game_path=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2

# Enable or disable cheat features
enable_cheats=true

# Toggle debug mode for detailed logs
debug_mode=false

[Hotkeys]
# Set hotkeys for various cheat functions
# Note: Hotkeys should not conflict with in-game keys
give_health=F1             # Press F1 to give health
give_ammo=F2               # Press F2 to give unlimited ammo
spawn_infected=F3          # Press F3 to spawn an infected enemy
toggle_god_mode=F4         # Press F4 to toggle god mode
toggle_inf_ammo=F5         # Press F5 to toggle infinite ammunition

[Features]
# Enable or disable specific cheat features
heal_self=true             # Heal yourself instantly
ammo_refill=true           # Refills ammo for the current weapon
spawn_items=true            # Spawn health kits or weapons
noclip=false               # Toggle noclip mode (fly through walls)
super_speed=false           # Increase player speed

[Display]
# Settings for the cheat app overlay
overlay_enabled=true        # Enable or disable the overlay
overlay_opacity=0.8        # Set the opacity of the overlay (0.0 to 1.0)
overlay_position=top-left   # Choose overlay position: top-left, top-right, bottom-left, bottom-right
font_size=14                # Set font size for the overlay display
```