```ini
[General]
; Set the application mode: true for cheat mode, false for regular mode
cheat_mode=true
; The game installation path; make sure it points to your Left 4 Dead 2 directory
game_path=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
; Enable or disable logs for troubleshooting
enable_logging=true
; Log file path
log_file=C:\L4D2CheatApp\logs\activity.log

[Hotkeys]
; Hotkeys for various cheat features
; M to toggle god mode (invulnerability)
god_mode_key=M
; F1 to toggle infinite ammo
infinite_ammo_key=F1
; F2 to spawn weapons
spawn_weapons_key=F2
; F3 to toggle noclip (fly through walls)
noclip_key=F3
; F4 to revive teammates immediately
revive_key=F4

[Features]
; Toggle features for player enhancements
; Enable god mode for invulnerability
enable_god_mode=true
; Enable infinite ammo for all weapons
enable_infinite_ammo=true
; Enable no-clipping mode to move through walls
enable_noclip=false
; Automatically heal all players when activated
enable_auto_heal=true
; Enable spawning specific melee weapons directly
enable_spawn_weapons=true

[Display]
; Configure the display settings for the cheat overlay
; Set the opacity of the overlay (0 = transparent, 255 = opaque)
overlay_opacity=150
; Position of the overlay on the screen
overlay_position_x=100
overlay_position_y=100
; Font size for displayed information
font_size=14