```ini
[General]
; Path to the Left 4 Dead 2 executable
GamePath=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2\left4dead2.exe

; Enable or disable the app
Enabled=true

; Set the language for cheat notifications
Language=en

[Hotkeys]
; Hotkey settings for activating cheats
; F1: Toggle unlimited ammo
ToggleUnlimitedAmmo=F1

; F2: Toggle god mode
ToggleGodMode=F2

; F3: Infinite health for teammates
ToggleTeamHealth=F3

; F4: Spawn items (medkits, grenades, etc.)
SpawnItems=F4

[Features]
; Enable or disable specific cheat features
; Unlimted ammunition toggle
UnlimitedAmmo=true

; God mode to prevent player death
GodMode=true

; Infinite health for nearby teammates
TeamHealth=true

; Speed modification for faster gameplay
SpeedModifier=1.5

; Spawn specific items on demand
SpawnItemsList=medkit, molotov, pipebomb

[Display]
; Configure the display settings for the overlay
; Enable or disable cheat notifications on the screen
ShowNotifications=true

; Position of overlay (x,y coordinates)
OverlayPosition=100,100

; Transparency level for the overlay (0=transparent, 255=opaque)
OverlayTransparency=200

; Font size for cheat notifications
FontSize=12

; Font color for cheat notifications (RGB format)
FontColor=255,0,0 ; Red color for emphasis
```