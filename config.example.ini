```ini
[General]
; General settings for the Left 4 Dead 2 cheat application
app_name = Left 4 Dead 2 Cheat Tool
version = 1.0.0
author = YourName
enable_logging = true
log_file_path = C:\L4D2CheatTool\logs\cheat_log.txt

[Hotkeys]
; Hotkeys for activating cheat features
toggle_infinite_ammo = F1       ; Press F1 to toggle infinite ammo
toggle_god_mode = F2             ; Press F2 to toggle god mode
toggle_invincibility = F3         ; Press F3 to toggle invincibility for teammates
toggle_no_clip = F4              ; Press F4 to toggle no clip mode
activate_speedhack = F5          ; Press F5 to activate speed hack

[Features]
; Enable or disable specific cheat features
infinite_ammo = true             ; Enable infinite ammo feature
god_mode = false                  ; Enable god mode (invulnerability)
team_invincibility = true         ; Make teammates invincible
no_clip_mode = false              ; Enable no clip mode to walk through walls
speedhack_multiplier = 2.0        ; Speed multiplier for speedhack (1.0 is normal speed)

[Display]
; Configuration for displaying cheat information during gameplay
show_hud = true                   ; Show HUD overlay while cheats are active
hud_position_x = 50               ; X position for HUD overlay
hud_position_y = 50               ; Y position for HUD overlay
hud_color = #FF0000               ; Color of the HUD text (Hex format)
display_fps = true                ; Show frames per second in HUD
```