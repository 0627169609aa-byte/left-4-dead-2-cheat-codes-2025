```ini
[General]
; Path to the Left 4 Dead 2 installation
GamePath=C:\Program Files (x86)\Steam\steamapps\common\Left 4 Dead 2
; Enable debugging logs for troubleshooting
EnableDebugLogs=true
; The default game mode to apply cheats (e.g., campaign, versus)
DefaultGameMode=campaign

[Hotkeys]
; Hotkeys to toggle various cheat features
ToggleGodMode=F1          ; Press F1 to toggle God Mode
ToggleInfiniteAmmo=F2     ; Press F2 to toggle Infinite Ammo
ToggleNoClip=F3           ; Press F3 to toggle No Clip mode
SpawnWeapons=F4           ; Press F4 to spawn weapons
ToggleSpeedHack=F5        ; Press F5 to toggle Speed Hack
ToggleBossSpawn=F6        ; Press F6 to spawn a tank or witch

[Features]
; Enable or disable specific cheat features
EnableGodMode=true        ; God Mode will prevent player from taking damage
EnableInfiniteAmmo=true   ; Infinite Ammo will allow unlimited ammunition
EnableNoClip=true         ; No Clip allows free movement through walls
EnableFastReload=true     ; Enable fast reloading of weapons
EnableOneHitKill=true     ; Enable one-hit kills for all infected
EnableSpawnItems=true     ; Allow spawning of health kits and grenades

[Display]
; Settings related to the in-game display
ShowCheatNotifications=true ; Show notifications when cheats are activated
HUDPosition=top-right        ; Default position of HUD elements
FontSize=16                  ; Font size for HUD elements
NotificationDuration=5       ; Duration in seconds for on-screen notifications
```