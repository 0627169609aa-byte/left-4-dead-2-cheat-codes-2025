```ini
[General]
# Application settings for the Left 4 Dead 2 cheat tool
AppName=Left 4 Dead 2 Cheat Tool
Version=1.0
Enabled=True

[Hotkeys]
# Hotkey settings for activating cheats in-game
ToggleGodMode=F1
ToggleInfiniteAmmo=F2
ToggleNoClip=F3
SpawnItem=F4
ToggleSpeedHack=F5
ToggleWallHack=F6

[Features]
# Features available in the cheat tool
EnableGodMode=True  ; Prevents player from taking damage
EnableInfiniteAmmo=True  ; Grants unlimited ammunition
EnableNoClip=True  ; Allows the player to clip through walls and obstacles
SpawnItems=True  ; Enables spawning specific weapons or items
EnableSpeedHack=True  ; Modifies player speed for faster movement
EnableWallHack=True  ; Allows the player to see enemies through walls

[Display]
# Settings related to the display of the cheat tool
ShowOverlay=True  ; Display an in-game overlay
OverlayPosition=top-right  ; Position of the overlay on the screen
OverlayOpacity=0.8  ; Opacity of the overlay (0.0 - fully transparent, 1.0 - fully opaque)
FontSize=12  ; Font size for overlay text
OverlayColor=#FF0000  ; Color of the overlay text in hexadecimal format (red)
```